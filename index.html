<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Dumbass 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(45deg, #210447, #52089d, #7b2cbf, #9d4edd, #c77dff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      font-family: 'Pacifico', cursive;
      text-align: center;
      color: white;
      overflow: hidden;
      height: 100%;
      min-height: 100vh;
      max-height: 100vh;
      width: 100%;
      position: fixed;
      inset: 0;
      cursor: pointer;
      transition: filter 0.5s;
    }

    #main-content {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    #main-content > * {
      pointer-events: auto;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 2000; /* Highest z-index */
      cursor: pointer;
      transition: opacity 0.5s;
    }
    #start-screen h1 { font-size: 3em; text-shadow: 2px 2px #000; }
    #start-screen p { font-size: 1.5em; }

    #popup-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 998;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #popup {
      position: relative;
      font-size: 3em;
      background: rgba(25, 8, 48, 0.75);
      padding: 30px 50px;
      border-radius: 20px;
      text-shadow: 2px 2px #000;
      color: #fff;
      opacity: 0;
      animation: popupAnim 1s forwards;
      margin-top: 0; 
    }

    @keyframes popupAnim {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .cat {
      font-size: 5em;
      animation: float 4s ease-in-out infinite, blink 1s infinite alternate;
      display: inline-block;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 1; }
      85%, 95% { opacity: 0; }
    }

    .balloon {
      position: absolute;
      width: 52px;
      height: 96px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation: rise linear infinite, sway ease-in-out infinite;
      transition: transform 0.3s, opacity 0.2s;
      z-index: 1500; /* UPDATED! Brings balloons to the very front */
      pointer-events: auto;
    }
    
    .balloon.popped {
        opacity: 0;
        transform: scale(1.5);
    }

    @keyframes rise {
      0% { bottom: -200px; }
      100% { bottom: 110vh; }
    }

    @keyframes sway {
      0%,100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }

    .balloon-border {
      position: fixed;
      top: 100%;
      left: -50%;
      width: 400%;
      /* opacity: 0.62; */
      z-index: 1400;
      pointer-events: none;
    }

    .balloon-border.rising {
      animation: borderRise 12s linear forwards;
    }

    @keyframes borderRise {
      0% { top: 100%; }
      100% { top: -520px; }
    }
    
    #photo-stage {
      position: relative;
      width: min(90vw, 900px);
      height: min(60vh, 520px);
      z-index: 1000;
      perspective: 1200px;
      margin-bottom: 20px;
    }

    .memory-photo {
      position: absolute;
      width: 180px;
      height: 240px;
      transition: transform 0.8s ease, left 0.8s ease, top 0.8s ease, box-shadow 0.4s ease;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .memory-photo .photo-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(31, 10, 58, 0.45);
    }

    .memory-photo.center .photo-inner {
      box-shadow: 0 18px 36px rgba(10, 0, 25, 0.55);
    }

    .memory-photo.flipped .photo-inner {
      transform: rotateY(180deg);
    }

    .photo-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .photo-front {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      box-sizing: border-box;
    }

    .photo-front img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #e9d8fd;
    }

    .photo-caption {
      margin: 6px 0 0;
      color: #5a189a;
      font-size: 0.95rem;
      font-family: 'Trebuchet MS', sans-serif;
    }

    .photo-back {
      background: linear-gradient(160deg, #4a148c, #7b2cbf);
      color: #f8f2ff;
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      text-align: center;
      font-size: 1rem;
      font-family: 'Trebuchet MS', sans-serif;
      line-height: 1.35;
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      opacity: 0.9;
      top: -10px;
      animation: confettiFall linear infinite;
      pointer-events: none;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(720deg); }
    }
    
    .pop-emoji {
      position: absolute;
      z-index: 1600; /* Higher than balloons */
      font-size: 4em;
      user-select: none;
      animation: popOut 1.5s ease-out forwards;
      transform: translate(-50%, -50%);
    }

    .pop-heart { font-size: 2em; }

    @keyframes popOut {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -150%) scale(1.2); opacity: 0; }
    }


    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      font-size: 2em;
      text-shadow: 1px 1px #000;
    }

    #central-emojis {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 8px;
        margin-bottom: -15px;
        font-size: 3.5em;
        z-index: 1001;
    }
    
    .wiggle-emoji {
        display: inline-block;
        animation: emojiWiggle 1.5s ease-in-out infinite;
    }

    @keyframes emojiWiggle {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(-8px) rotate(4deg); }
    }

    .wiggle-emoji:nth-of-type(1) { animation-delay: -0.3s; }
    .wiggle-emoji:nth-of-type(2) { animation-delay: -0.8s; animation-direction: alternate-reverse; }
    .wiggle-emoji:nth-of-type(3) { animation-delay: -0.5s; }

    /* Letter invite + envelope (from Letter folder) */
    .letter-ui-hidden { display: none !important; }

    #letter-invite {
      position: fixed;
      left: 50%;
      bottom: -320px;
      transform: translateX(-50%);
      z-index: 2500;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: bottom 2.8s ease-out, opacity 0.6s ease;
    }

    #letter-invite.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    #letter-invite.has-risen {
      bottom: 10vh;
    }

    #letter-invite.is-active::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(280px, 60vw);
      height: min(280px, 60vw);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 255, 0.45) 0%, rgba(199, 125, 255, 0.15) 45%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      animation: inviteGlow 2.5s ease-in-out infinite;
    }

    @keyframes inviteGlow {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(0.95); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    #letter-invite img {
      width: min(240px, 52vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.35));
      animation: inviteFloat 3s ease-in-out infinite;
      transition: filter 0.6s ease;
    }

    #letter-invite.is-active img {
      filter:
        drop-shadow(0 0 22px rgba(255, 210, 255, 0.9))
        drop-shadow(0 0 40px rgba(199, 125, 255, 0.55))
        drop-shadow(0 12px 24px rgba(0, 0, 0, 0.35))
        brightness(1.28)
        contrast(1.1)
        saturate(1.4);
    }

    @keyframes inviteFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-14px) scale(1.02); }
    }

    #letter-overlay {
      position: fixed;
      inset: 0;
      background: rgba(12, 2, 28, 0.78);
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #letter-overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    #letter-scene {
      position: fixed;
      inset: 0;
      z-index: 3100;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #letter-scene.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    #letter-scene .envlope-wrapper {
      cursor: pointer;
      perspective: 1200px;
    }

    #envelope {
      position: relative;
      width: 280px;
      height: 180px;
      transform-style: preserve-3d;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
      background-color: #3c096c;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
    }

    #envelope .front {
      position: absolute;
      width: 0;
      height: 0;
      z-index: 3;
    }

    #envelope .flap {
      border-left: 140px solid transparent;
      border-right: 140px solid transparent;
      border-bottom: 82px solid transparent;
      border-top: 98px solid #3c096c;
      transform-origin: top;
      pointer-events: none;
    }

    #envelope .pocket {
      border-left: 140px solid #7b2cbf;
      border-right: 140px solid #7b2cbf;
      border-bottom: 90px solid #6a1b9a;
      border-top: 90px solid transparent;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
    }

    #envelope .letter {
      position: relative;
      background-color: #fff;
      width: 90%;
      margin: 0 auto;
      height: 90%;
      top: 5%;
      border-radius: 6px;
      box-shadow: 0 2px 26px rgba(0, 0, 0, 0.12);
    }

    #envelope .letter:after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0) 25%, rgba(233, 216, 253, 0.7) 55%, rgba(233, 216, 253, 1) 100%);
      border-radius: 6px;
      pointer-events: none;
    }

    #envelope .letter-preview {
      position: absolute;
      left: 10%;
      width: 80%;
      height: 10%;
      background-color: #e9d8fd;
      border-radius: 3px;
    }

    #envelope .letter-preview.line1 { top: 18%; width: 35%; height: 7%; }
    #envelope .letter-preview.line2 { top: 32%; }
    #envelope .letter-preview.line3 { top: 48%; }
    #envelope .letter-preview.line4 { top: 64%; }

    #envelope.open .flap {
      transform: rotateX(180deg);
      transition: transform 0.4s ease, z-index 0.6s;
      z-index: 1;
    }

    #envelope.close .flap {
      transform: rotateX(0deg);
      transition: transform 0.4s 0.6s ease, z-index 1s;
      z-index: 5;
    }

    #envelope.close .letter {
      transform: translateY(0);
      transition: transform 0.4s ease, z-index 1s;
      z-index: 1;
    }

    #envelope.open .letter {
      transform: translateY(-60px);
      transition: transform 0.4s 0.6s ease, z-index 0.6s;
      z-index: 2;
    }

    /* Hearts behind pocket/flap (.front z-index 3) — matches Letter folder */
    #envelope .hearts {
      position: absolute;
      top: 90px;
      left: 0;
      right: 0;
      z-index: 2;
      pointer-events: none;
    }

    #envelope .heart {
      position: absolute;
      bottom: 0;
      right: 10%;
      pointer-events: none;
      will-change: top, margin-left;
    }

    #envelope .heart:before,
    #envelope .heart:after {
      position: absolute;
      content: "";
      left: 50px;
      top: 0;
      width: 50px;
      height: 80px;
      background: #d00000;
      border-radius: 50px 50px 0 0;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    #envelope .heart:after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    #envelope.close .heart { opacity: 0; }
    #envelope.open .heart.a1 {
      left: 20%;
      -webkit-transform: scale(0.6);
      transform: scale(0.6);
      opacity: 1;
      -webkit-animation: slideUp 4s linear 1 forwards, sideSway 2s ease-in-out 4 alternate;
      animation: slideUp 4s linear 1 forwards, sideSway 2s ease-in-out 4 alternate;
      animation-delay: 0.7s;
    }
    #envelope.open .heart.a2 {
      left: 55%;
      -webkit-transform: scale(1);
      transform: scale(1);
      opacity: 1;
      -webkit-animation: slideUp 5s linear 1 forwards, sideSway 4s ease-in-out 2 alternate;
      animation: slideUp 5s linear 1 forwards, sideSway 4s ease-in-out 2 alternate;
      animation-delay: 0.7s;
    }
    #envelope.open .heart.a3 {
      left: 10%;
      -webkit-transform: scale(0.8);
      transform: scale(0.8);
      opacity: 1;
      -webkit-animation: slideUp 7s linear 1 forwards, sideSway 2s ease-in-out 6 alternate;
      animation: slideUp 7s linear 1 forwards, sideSway 2s ease-in-out 6 alternate;
      animation-delay: 0.7s;
    }

    @keyframes slideUp {
      0% { top: 0; }
      100% { top: -500px; }
    }

    @keyframes sideSway {
      0% { margin-left: 0; }
      100% { margin-left: 50px; }
    }

    #letter-paper-full {
      position: fixed;
      inset: 0;
      z-index: 3200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: rgba(18, 4, 40, 0.94);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #letter-paper-full.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .letter-paper-inner {
      background: linear-gradient(180deg, #fffef9 0%, #f8f2ff 100%);
      max-width: min(92vw, 560px);
      max-height: 88vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 2rem 1.75rem;
      border-radius: 10px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      text-align: left;
      width: 100%;
      box-sizing: border-box;
    }

    .letter-body {
      font-family: 'Caveat', cursive;
      font-size: 1.45rem;
      font-weight: 500;
      line-height: 1.55;
      color: #2d1b4e;
    }

    .letter-body p {
      margin: 0 0 1.1rem;
    }

    .letter-body p:last-child {
      margin-bottom: 0;
    }

    .letter-photo {
      text-align: center;
      margin: 1.25rem 0 1.5rem;
    }

    .letter-photo img {
      display: block;
      max-width: min(100%, 320px);
      width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(60, 20, 100, 0.2);
      border: 3px solid #e9d8fd;
    }

    .letter-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3150;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.95rem;
      color: #e9d8fd;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .letter-hint.is-visible { opacity: 1; }

    @media (max-width: 768px) {
        .cat { font-size: 4em; }
        #envelope { width: 240px; height: 154px; }
        #envelope .flap {
          border-left-width: 120px;
          border-right-width: 120px;
          border-bottom-width: 70px;
          border-top-width: 84px;
        }
        #envelope .pocket {
          border-left-width: 120px;
          border-right-width: 120px;
          border-bottom-width: 77px;
          border-top-width: 77px;
        }
        .balloon { width: 46px; height: 85px; }
        #popup { font-size: 2.5em; padding: 20px 30px;}
        #photo-stage { height: min(52vh, 420px); }
        .memory-photo { width: 150px; height: 200px; }
        .photo-front img { height: 145px; }
        #central-emojis { font-size: 3em; margin-bottom: -10px;}
        .footer { font-size: 1.5em; }
        #start-screen h1 { font-size: 2.5em; }
        #start-screen p { font-size: 1.2em; }
        #popup-container { gap: 5px; }
    }

    @media (max-width: 480px) {
        .cat { font-size: 3em; }
        .balloon { width: 38px; height: 70px; }
        #popup { font-size: 1.5em; padding: 15px 20px;}
        #photo-stage { width: 95vw; height: min(46vh, 360px); }
        .memory-photo { width: 118px; height: 164px; }
        .photo-front img { height: 110px; }
        .photo-caption { font-size: 0.75rem; }
        .photo-back { font-size: 0.8rem; padding: 10px; }
        #central-emojis { font-size: 2.5em; margin-bottom: -5px;}
        .footer { font-size: 1em; }
        #start-screen h1 { font-size: 2em; }
        #start-screen p { font-size: 1em; }
        #popup-container { gap: 3px; }
    }
  </style>
</head>
<body>
  <div id="start-screen">
      <h1>A little surprise...</h1>
      <p>(Click to open!)</p>
  </div>

  <div id="main-content" style="display: none;">
      <img src="./Balloons/Balloon-Border.png" alt="" class="balloon-border" id="balloon-border">
      <div id="popup-container">
          <div id="photo-stage" aria-label="Memory photos"></div>
          <!-- <div id="central-emojis">
              <span class="wiggle-emoji">🕯️</span>
              <span class="wiggle-emoji">🎂</span>
              <span class="wiggle-emoji">🕯️</span>
          </div> -->
          <div id="popup">
            🎉 Happy Birthday Dumbass 🎉
          </div>
      </div>
      
      <div class="cat">🐱</div>
      <div class="cat" style="animation-delay:0.5s;">😺</div>
      <div class="cat" style="animation-delay:1s;">😸</div>
      <div class="cat" style="animation-delay:1.5s;">😻</div>

      <audio id="birthday-song" loop>
        <source src="lipistic.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
      </audio>
      <audio id="letter-song" loop>

        <source src="letterbackground.mp3" type="audio/mpeg">
      </audio>

      <!-- <div class="footer">
        Made with ❤️ and meow vibes 🐾

  </div>

  <div id="letter-invite" class="letter-ui-hidden" aria-label="Open letter">
    <img src="./Pictures/balloon-tied-to-an-envelope.png" alt="Balloon with envelope">
  </div>

  <div id="letter-overlay" class="letter-ui-hidden"></div>

  <div id="letter-scene" class="letter-ui-hidden">
    <div class="envlope-wrapper">
      <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        <div class="letter">

        <div class="hearts">
          <div class="heart a1"></div>
          <div class="heart a2"></div>

      </div>
    </div>
  </div>

  <p id="letter-hint" class="letter-hint letter-ui-hidden">Click the envelope to open</p>

  <div id="letter-paper-full" class="letter-ui-hidden">
    <div class="letter-paper-inner">
      <div id="letter-body" class="letter-body"></div>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const mainContent = document.getElementById('main-content');
    const song = document.getElementById('birthday-song');
    const photoStage = document.getElementById('photo-stage');
    const balloonBorder = document.getElementById('balloon-border');
    const letterInvite = document.getElementById('letter-invite');
    const letterOverlay = document.getElementById('letter-overlay');
    const letterScene = document.getElementById('letter-scene');
    const letterPaperFull = document.getElementById('letter-paper-full');
    const letterBodyEl = document.getElementById('letter-body');
    const letterHint = document.getElementById('letter-hint');
    const envelope = document.getElementById('envelope');
    const letterSong = document.getElementById('letter-song');
    let letterState = 'idle';
    let letterContent = '';
    let letterInviteTimer = null;
    const LETTER_INVITE_DELAY_MS = 30000;

    const letterContentFallback = `Nats

I am so sorry 
Like genuinely so sorry for being an ass to you
I know no excuse I give would justify the fact that I broke your heart not once but multiple times

But trust me I never intended to do so...i was caught up in my own tornado that I never saw how my absence was causing someone so much pain

    async function loadLetterContent() {
      try {
        const res = await fetch('./letterContent.txt');
        if (res.ok) {
          letterContent = await res.text();
          return;
        }
      } catch (_) {}
      letterContent = letterContentFallback;
    }

    loadLetterContent();
    const photosData = [
      { src: './Pictures/image1.jpeg', caption: 'Best smile', desc: 'A memory worth framing forever.' },
      { src: './Pictures/image2.jpeg', caption: 'Cute moment', desc: 'One photo, a thousand happy thoughts.' },
      { src: './Pictures/image3.jpeg', caption: 'Golden vibe', desc: 'You make every day brighter.' },
      { src: './Pictures/image4.jpeg', caption: 'Iconic look', desc: 'Born to stand out and shine.' },
      { src: './Pictures/image5.jpeg', caption: 'Pure joy', desc: 'This one always makes me smile.' },
      { src: './Pictures/image6.jpeg', caption: 'Sweet energy', desc: 'Your laugh is my favorite soundtrack.' },
      { src: './Pictures/image7.jpeg', caption: 'Lovely frame', desc: 'Every angle is your best angle.' },
      { src: './Pictures/image8.jpeg', caption: 'Star moment', desc: 'Main character energy always.' },
      { src: './Pictures/image9.jpeg', caption: 'Happy soul', desc: 'A photo full of warmth.' },
      { src: './Pictures/image10.jpeg', caption: 'Magic vibe', desc: 'Memories like this are priceless.' },
      { src: './Pictures/image11.jpeg', caption: 'Favorite shot', desc: 'Saving this in my heart forever.' }
    ];
    let currentCenterIndex = 0;

    function startCelebration() {
        startScreen.style.opacity = '0';
        mainContent.style.display = 'block';
        song.play();
        setTimeout(() => startScreen.style.display = 'none', 500);

        document.body.style.filter = 'blur(2px)';
        
        setTimeout(() => {
          document.body.style.filter = 'blur(0)';
        }, 1500);
        
        initPhotoShuffle();
        createInitialConfetti();

        // Initial set of balloons based on screen size (kept light)
        let balloonCount = 3;
        if (window.innerWidth <= 768) {
            balloonCount = 2;
        }
        if (window.innerWidth <= 480) {
            balloonCount = 2;
        }

        for (let i = 0; i < balloonCount; i++) {
            setTimeout(createBalloon, i * 1200);
        }

        startBalloonBorderRise();
        // Reduced count while keeping the Birthday1-like flying effect.
        launchBalloonShow();
        scheduleLetterInvite();
    }

    startScreen.addEventListener('click', startCelebration);

    function scheduleLetterInvite() {
      if (letterInviteTimer) clearTimeout(letterInviteTimer);
      letterState = 'idle';
      letterInvite.classList.add('letter-ui-hidden');
      letterInvite.classList.remove('is-active', 'has-risen');

      letterInviteTimer = setTimeout(() => {
        letterState = 'floating';
        letterInvite.classList.remove('letter-ui-hidden');
        requestAnimationFrame(() => {
          letterInvite.classList.add('is-active');
          requestAnimationFrame(() => letterInvite.classList.add('has-risen'));
        });
      }, LETTER_INVITE_DELAY_MS);
    }

    function showEnvelopeScene() {
      letterOverlay.classList.remove('letter-ui-hidden');
      letterScene.classList.remove('letter-ui-hidden');
      letterHint.classList.remove('letter-ui-hidden');
      requestAnimationFrame(() => {
        letterOverlay.classList.add('is-visible');
        letterScene.classList.add('is-visible');
        letterHint.classList.add('is-visible');
        letterHint.textContent = 'Click the envelope to open';
      });
      envelope.classList.remove('open');
      envelope.classList.add('close');
    }

    function openEnvelope() {
      envelope.classList.remove('close');
      envelope.classList.add('open');
      letterState = 'open';
      letterHint.textContent = 'Click again to read the letter';
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatParagraph(text) {
      return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function buildLetterHtml(text) {
      const paragraphs = text.trim().split(/\n\s*\n/).map((p) => p.trim()).filter(Boolean);
      if (!paragraphs.length) return '';

      const firstThree = paragraphs.slice(0, 3);
      const remaining = paragraphs.slice(3);

      let html = firstThree.map((p) => `<p>${formatParagraph(p)}</p>`).join('');
      html += '<div class="letter-photo"><img src="./Pictures/Picture.jpeg" alt="A special memory"></div>';
      html += remaining.map((p) => `<p>${formatParagraph(p)}</p>`).join('');
      return html;
    }

    function showFullLetterPaper() {
      letterBodyEl.innerHTML = buildLetterHtml(letterContent || letterContentFallback);
      letterScene.classList.remove('is-visible');
      letterHint.classList.remove('is-visible');
      letterPaperFull.classList.remove('letter-ui-hidden');
      requestAnimationFrame(() => letterPaperFull.classList.add('is-visible'));
      letterState = 'paper';
      switchToLetterMusic();
    }

    function switchToLetterMusic() {
      song.pause();
      letterSong.currentTime = 0;
      letterSong.volume = 1;
      letterSong.play().catch(() => {});
    }

    letterInvite.addEventListener('click', (e) => {
      e.stopPropagation();
      if (letterState !== 'floating') return;
      letterState = 'envelope';
      letterInvite.classList.remove('is-active', 'has-risen');
      letterInvite.classList.add('letter-ui-hidden');
      showEnvelopeScene();
    });

    envelope.addEventListener('click', (e) => {
      e.stopPropagation();
      if (letterState === 'envelope') {
        openEnvelope();
      } else if (letterState === 'open') {
        showFullLetterPaper();
      }
    });

    letterOverlay.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    const colors = ['#f3e8ff', '#e9d5ff', '#d8b4fe', '#c084fc', '#a855f7', '#9333ea', '#7e22ce', '#6b21a8', '#4c1d95'];

    function createConfetti(x, y, count = 20) {
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.classList.add('confetti');
        c.style.left = x + (Math.random() * 50 - 25) + 'px';
        c.style.top = y + (Math.random() * 50 - 25) + 'px';
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        c.style.width = Math.random() * 10 + 5 + 'px';
        c.style.height = c.style.width;
        c.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }
    }

    function createInitialConfetti() {
      for (let i = 0; i < 150; i++) {
        const c = document.createElement('div');
        c.classList.add('confetti');
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = Math.random() * -50 + 'px';
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        c.style.width = Math.random() * 10 + 5 + 'px';
        c.style.height = c.style.width;
        c.style.animationDuration = (Math.random() * 5 + 3) + 's';
        c.style.animationDelay = (Math.random() * 5) + 's';
        document.body.appendChild(c);
      }
    }

    document.addEventListener('mousemove', (e) => createConfetti(e.clientX, e.clientY, 3));
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('balloon')) return;
        if (e.target.closest('#letter-invite, #letter-scene, #letter-paper-full, #envelope')) return;
        createConfetti(e.clientX, e.clientY, 30);
    });
    
    const catEmojis = ['🐱', '😺', '😸', '😻', '😼', '😽', '🙀', '😹', '🐾'];
    const balloonImages = [
      './Balloons/b1.png',
      './Balloons/b2.png',
      './Balloons/b3.png',
      './Balloons/b4.png',
      './Balloons/b5.png',
      './Balloons/b6.png',
      './Balloons/b7.png'
    ];

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createPhotoCard(photo, index) {
      const card = document.createElement('article');
      card.className = 'memory-photo';
      card.id = `photo_${index}`;
      card.innerHTML = `
        <div class="photo-inner">
          <div class="photo-face photo-front">
            <img src="${photo.src}" alt="${photo.caption}">
            <p class="photo-caption">${photo.caption}</p>
          </div>
          <div class="photo-face photo-back">${photo.desc}</div>
        </div>
      `;
      card.addEventListener('click', () => handlePhotoClick(card));
      return card;
    }

    function getPhotoRanges() {
      const stageRect = photoStage.getBoundingClientRect();
      const sample = photoStage.querySelector('.memory-photo');
      const cardW = sample ? sample.offsetWidth : 180;
      const cardH = sample ? sample.offsetHeight : 240;
      const centerX = Math.floor(stageRect.width / 2 - cardW / 2);
      const centerY = Math.floor(stageRect.height / 2 - cardH / 2);
      return {
        centerX,
        centerY,
        left: { x: [0, Math.max(0, centerX - cardW)], y: [0, Math.max(0, stageRect.height - cardH)] },
        right: { x: [Math.min(stageRect.width - cardW, centerX + cardW), Math.max(0, stageRect.width - cardW)], y: [0, Math.max(0, stageRect.height - cardH)] }
      };
    }

    function placePhoto(card, x, y, rotateDeg, scale = 1) {
      card.style.left = `${x}px`;
      card.style.top = `${y}px`;
      card.style.transform = `rotate(${rotateDeg}deg) scale(${scale})`;
      card.classList.remove('flipped');
      card.classList.remove('center');
    }

    function sortPhotos(centerIndex) {
      const cards = [...photoStage.querySelectorAll('.memory-photo')];
      if (!cards.length) return;
      const safeCenter = ((centerIndex % cards.length) + cards.length) % cards.length;
      const ranges = getPhotoRanges();
      cards.forEach((card) => {
        card.classList.remove('center');
        card.classList.remove('flipped');
      });

      const centerCard = cards[safeCenter];
      centerCard.classList.add('center');
      placePhoto(centerCard, ranges.centerX, ranges.centerY, 0, 1.08);

      const rest = cards.filter((_, i) => i !== safeCenter);
      const leftCount = Math.ceil(rest.length / 2);
      rest.slice(0, leftCount).forEach((card) => {
        placePhoto(
          card,
          randomBetween(ranges.left.x[0], ranges.left.x[1]),
          randomBetween(ranges.left.y[0], ranges.left.y[1]),
          randomBetween(-35, 35)
        );
      });

      rest.slice(leftCount).forEach((card) => {
        placePhoto(
          card,
          randomBetween(ranges.right.x[0], ranges.right.x[1]),
          randomBetween(ranges.right.y[0], ranges.right.y[1]),
          randomBetween(-35, 35)
        );
      });
      currentCenterIndex = safeCenter;
    }

    function getNextCenterIndex() {
      if (!photosData.length) return 0;
      return (currentCenterIndex + 1) % photosData.length;
    }

    function handlePhotoClick(card) {
      const cards = [...photoStage.querySelectorAll('.memory-photo')];
      if (!cards.length) return;
      const clickedIndex = cards.indexOf(card);
      if (clickedIndex >= 0) {
        currentCenterIndex = clickedIndex;
      }
      sortPhotos(getNextCenterIndex());
    }

    function initPhotoShuffle() {
      photoStage.innerHTML = '';
      photosData.forEach((photo, index) => {
        photoStage.appendChild(createPhotoCard(photo, index));
      });
      sortPhotos(0);
    }

    function createBalloonBurst(total = 24, spreadMs = 6000) {
      for (let i = 0; i < total; i++) {
        setTimeout(createBalloon, randomBetween(0, spreadMs));
      }
    }

    function startBalloonBorderRise() {
      balloonBorder.classList.remove('rising');
      void balloonBorder.offsetWidth;
      balloonBorder.classList.add('rising');
    }

    function launchBalloonShow() {
      createBalloonBurst(4, 4000);
      setTimeout(() => createBalloonBurst(3, 3500), 4500);
    }

    function createPopEffect(x, y) {
        const catEl = document.createElement('div');
        catEl.classList.add('pop-emoji');
        catEl.innerText = catEmojis[Math.floor(Math.random() * catEmojis.length)];
        catEl.style.left = x + 'px';
        catEl.style.top = y + 'px';
        document.body.appendChild(catEl);
        setTimeout(() => catEl.remove(), 1500);

        for (let i = 0; i < 5; i++) {
            const heartEl = document.createElement('div');
            heartEl.classList.add('pop-emoji', 'pop-heart');
            heartEl.innerText = '❤️';
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 50 + 20;
            const heartX = x + radius * Math.cos(angle);
            const heartY = y + radius * Math.sin(angle);
            heartEl.style.left = heartX + 'px';
            heartEl.style.top = heartY + 'px';
            heartEl.style.animationDelay = Math.random() * 0.2 + 's';
            document.body.appendChild(heartEl);
            setTimeout(() => heartEl.remove(), 1500);
        }
    }
    
    function createBalloon() {
        const balloon = document.createElement('div');
        balloon.classList.add('balloon');

        const balloonImage = balloonImages[Math.floor(Math.random() * balloonImages.length)];
        const leftPosition = Math.random() * 90 + 5;
        const riseDuration = Math.random() * 6 + 12;
        const swayDuration = Math.random() * 3 + 6;

        balloon.style.backgroundImage = `url('${balloonImage}')`;
        balloon.style.left = leftPosition + 'vw';
        balloon.style.animationDuration = `${riseDuration}s, ${swayDuration}s`;

        balloon.addEventListener('click', () => {
            if (!balloon.classList.contains('popped')) {
                balloon.classList.add('popped');
                const rect = balloon.getBoundingClientRect();
                
                createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2, 50);
                createPopEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);

                setTimeout(() => {
                    balloon.remove();
                    setTimeout(createBalloon, 3500); 
                }, 2000);
            }
        }, { once: true });

        mainContent.appendChild(balloon);
    }

    window.addEventListener('resize', () => {
      if (photoStage.children.length) {
        const cards = [...photoStage.querySelectorAll('.memory-photo')];
        const centerIndex = cards.findIndex((card) => card.classList.contains('center'));
        sortPhotos(centerIndex >= 0 ? centerIndex : 0);
      }
    });
  </script>
