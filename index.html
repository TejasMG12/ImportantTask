<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Chommu 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(45deg, #2b0a57, #5a189a, #7b2cbf, #9d4edd, #c77dff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      font-family: 'Pacifico', cursive;
      text-align: center;
      color: white;
      overflow: hidden;
      height: 100vh;
      cursor: pointer;
      transition: filter 0.5s;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 2000; /* Highest z-index */
      cursor: pointer;
      transition: opacity 0.5s;
    }
    #start-screen h1 { font-size: 3em; text-shadow: 2px 2px #000; }
    #start-screen p { font-size: 1.5em; }

    #popup-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 998;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #popup {
      position: relative;
      font-size: 3em;
      background: rgba(25, 8, 48, 0.75);
      padding: 30px 50px;
      border-radius: 20px;
      text-shadow: 2px 2px #000;
      color: #fff;
      opacity: 0;
      animation: popupAnim 1s forwards;
      margin-top: 0; 
    }

    @keyframes popupAnim {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .cat {
      font-size: 5em;
      animation: float 4s ease-in-out infinite, blink 1s infinite alternate;
      display: inline-block;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 1; }
      85%, 95% { opacity: 0; }
    }

    .balloon {
      position: absolute;
      font-size: 5em;
      animation: rise linear infinite, sway ease-in-out infinite;
      transition: transform 0.3s, opacity 0.2s;
      z-index: 1500; /* UPDATED! Brings balloons to the very front */
    }
    
    .balloon.popped {
        opacity: 0;
        transform: scale(1.5);
    }

    @keyframes rise {
      0% { bottom: -200px; }
      100% { bottom: 110vh; }
    }

    @keyframes sway {
      0%,100% { transform: translateX(0); }
      50% { transform: translateX(20px); }
    }
    
    #photo-stage {
      position: relative;
      width: min(90vw, 900px);
      height: min(60vh, 520px);
      z-index: 1000;
      perspective: 1200px;
      margin-bottom: 20px;
    }

    .memory-photo {
      position: absolute;
      width: 180px;
      height: 240px;
      transition: transform 0.8s ease, left 0.8s ease, top 0.8s ease, box-shadow 0.4s ease;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .memory-photo .photo-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(31, 10, 58, 0.45);
    }

    .memory-photo.center .photo-inner {
      box-shadow: 0 18px 36px rgba(10, 0, 25, 0.55);
    }

    .memory-photo.flipped .photo-inner {
      transform: rotateY(180deg);
    }

    .photo-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .photo-front {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      box-sizing: border-box;
    }

    .photo-front img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #e9d8fd;
    }

    .photo-caption {
      margin: 6px 0 0;
      color: #5a189a;
      font-size: 0.95rem;
      font-family: 'Trebuchet MS', sans-serif;
    }

    .photo-back {
      background: linear-gradient(160deg, #4a148c, #7b2cbf);
      color: #f8f2ff;
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      text-align: center;
      font-size: 1rem;
      font-family: 'Trebuchet MS', sans-serif;
      line-height: 1.35;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.9;
      top: -10px;
      animation: confettiFall linear infinite;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(720deg); }
    }
    
    .pop-emoji {
      position: absolute;
      z-index: 1600; /* Higher than balloons */
      font-size: 4em;
      user-select: none;
      animation: popOut 1.5s ease-out forwards;
      transform: translate(-50%, -50%);
    }

    .pop-heart { font-size: 2em; }

    @keyframes popOut {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -150%) scale(1.2); opacity: 0; }
    }


    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      font-size: 2em;
      text-shadow: 1px 1px #000;
    }

    #central-emojis {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 8px;
        margin-bottom: -15px;
        font-size: 3.5em;
        z-index: 1001;
    }
    
    .wiggle-emoji {
        display: inline-block;
        animation: emojiWiggle 1.5s ease-in-out infinite;
    }

    @keyframes emojiWiggle {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(-8px) rotate(4deg); }
    }

    .wiggle-emoji:nth-of-type(1) { animation-delay: -0.3s; }
    .wiggle-emoji:nth-of-type(2) { animation-delay: -0.8s; animation-direction: alternate-reverse; }
    .wiggle-emoji:nth-of-type(3) { animation-delay: -0.5s; }
    
    @media (max-width: 768px) {
        .cat { font-size: 4em; }
        .balloon { font-size: 4em; }
        #popup { font-size: 2.5em; padding: 20px 30px;}
        #photo-stage { height: min(52vh, 420px); }
        .memory-photo { width: 150px; height: 200px; }
        .photo-front img { height: 145px; }
        #central-emojis { font-size: 3em; margin-bottom: -10px;}
        .footer { font-size: 1.5em; }
        #start-screen h1 { font-size: 2.5em; }
        #start-screen p { font-size: 1.2em; }
        #popup-container { gap: 5px; }
    }

    @media (max-width: 480px) {
        .cat { font-size: 3em; }
        .balloon { font-size: 3em; }
        #popup { font-size: 1.5em; padding: 15px 20px;}
        #photo-stage { width: 95vw; height: min(46vh, 360px); }
        .memory-photo { width: 118px; height: 164px; }
        .photo-front img { height: 110px; }
        .photo-caption { font-size: 0.75rem; }
        .photo-back { font-size: 0.8rem; padding: 10px; }
        #central-emojis { font-size: 2.5em; margin-bottom: -5px;}
        .footer { font-size: 1em; }
        #start-screen h1 { font-size: 2em; }
        #start-screen p { font-size: 1em; }
        #popup-container { gap: 3px; }
    }
  </style>
</head>
<body>
  <div id="start-screen">
      <h1>A little surprise...</h1>
      <p>(Click to open!)</p>
  </div>

  <div id="main-content" style="display: none;">
      <div id="popup-container">
          <div id="photo-stage" aria-label="Memory photos"></div>
          <!-- <div id="central-emojis">
              <span class="wiggle-emoji">🕯️</span>
              <span class="wiggle-emoji">🎂</span>
              <span class="wiggle-emoji">🕯️</span>
          </div> -->
          <div id="popup">
            🎉 Happy Birthday Chommu 🎉
          </div>
      </div>
      
      <div class="cat">🐱</div>
      <div class="cat" style="animation-delay:0.5s;">😺</div>
      <div class="cat" style="animation-delay:1s;">😸</div>
      <div class="cat" style="animation-delay:1.5s;">😻</div>

      <audio id="birthday-song" loop>
        <source src="lipistic.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
      </audio>

      <!-- <div class="footer">
        Made with ❤️ and meow vibes 🐾
      </div> -->
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const mainContent = document.getElementById('main-content');
    const song = document.getElementById('birthday-song');
    const photoStage = document.getElementById('photo-stage');
    const photosData = [
      { src: './Pictures/image1.jpeg', caption: 'Best smile', desc: 'A memory worth framing forever.' },
      { src: './Pictures/image2.jpeg', caption: 'Cute moment', desc: 'One photo, a thousand happy thoughts.' },
      { src: './Pictures/image3.jpeg', caption: 'Golden vibe', desc: 'You make every day brighter.' },
      { src: './Pictures/image4.jpeg', caption: 'Iconic look', desc: 'Born to stand out and shine.' },
      { src: './Pictures/image5.jpeg', caption: 'Pure joy', desc: 'This one always makes me smile.' },
      { src: './Pictures/image6.jpeg', caption: 'Sweet energy', desc: 'Your laugh is my favorite soundtrack.' },
      { src: './Pictures/image7.jpeg', caption: 'Lovely frame', desc: 'Every angle is your best angle.' },
      { src: './Pictures/image8.jpeg', caption: 'Star moment', desc: 'Main character energy always.' },
      { src: './Pictures/image9.jpeg', caption: 'Happy soul', desc: 'A photo full of warmth.' },
      { src: './Pictures/image10.jpeg', caption: 'Magic vibe', desc: 'Memories like this are priceless.' },
      { src: './Pictures/image11.jpeg', caption: 'Favorite shot', desc: 'Saving this in my heart forever.' }
    ];

    function startCelebration() {
        startScreen.style.opacity = '0';
        mainContent.style.display = 'block';
        song.play();
        setTimeout(() => startScreen.style.display = 'none', 500);

        document.body.style.filter = 'blur(2px)';
        
        setTimeout(() => {
          document.body.style.filter = 'blur(0)';
        }, 1500);
        
        initPhotoShuffle();
        createInitialConfetti();

        // UPDATED! Logic to set balloon count based on screen size
        let balloonCount = 6; // Default for desktop
        if (window.innerWidth <= 768) {
            balloonCount = 4; // for tablets
        }
        if (window.innerWidth <= 480) {
            balloonCount = 3; // for mobile phones
        }

        for (let i = 0; i < balloonCount; i++) {
            setTimeout(createBalloon, i * 500);
        }

        // Extra burst inspired by Birthday1: many balloons fly right after surprise.
        createBalloonBurst(28, 7000);
    }

    startScreen.addEventListener('click', startCelebration);

    const colors = ['#f3e8ff', '#e9d5ff', '#d8b4fe', '#c084fc', '#a855f7', '#9333ea', '#7e22ce', '#6b21a8', '#4c1d95'];

    function createConfetti(x, y, count = 20) {
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.classList.add('confetti');
        c.style.left = x + (Math.random() * 50 - 25) + 'px';
        c.style.top = y + (Math.random() * 50 - 25) + 'px';
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        c.style.width = Math.random() * 10 + 5 + 'px';
        c.style.height = c.style.width;
        c.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }
    }

    function createInitialConfetti() {
      for (let i = 0; i < 150; i++) {
        const c = document.createElement('div');
        c.classList.add('confetti');
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = Math.random() * -50 + 'px';
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        c.style.width = Math.random() * 10 + 5 + 'px';
        c.style.height = c.style.width;
        c.style.animationDuration = (Math.random() * 5 + 3) + 's';
        c.style.animationDelay = (Math.random() * 5) + 's';
        document.body.appendChild(c);
      }
    }

    document.addEventListener('mousemove', (e) => createConfetti(e.clientX, e.clientY, 3));
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('balloon')) return;
        createConfetti(e.clientX, e.clientY, 30);
    });
    
    const catEmojis = ['🐱', '😺', '😸', '😻', '😼', '😽', '🙀', '😹', '🐾'];
    const balloonColors = ['#7e22ce', '#9333ea', '#a855f7', '#c084fc', '#d8b4fe', '#e9d5ff', '#6d28d9', '#5b21b6'];

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createPhotoCard(photo, index) {
      const card = document.createElement('article');
      card.className = 'memory-photo';
      card.id = `photo_${index}`;
      card.innerHTML = `
        <div class="photo-inner">
          <div class="photo-face photo-front">
            <img src="${photo.src}" alt="${photo.caption}">
            <p class="photo-caption">${photo.caption}</p>
          </div>
          <div class="photo-face photo-back">${photo.desc}</div>
        </div>
      `;
      card.addEventListener('click', () => handlePhotoClick(card));
      return card;
    }

    function getPhotoRanges() {
      const stageRect = photoStage.getBoundingClientRect();
      const sample = photoStage.querySelector('.memory-photo');
      const cardW = sample ? sample.offsetWidth : 180;
      const cardH = sample ? sample.offsetHeight : 240;
      const centerX = Math.floor(stageRect.width / 2 - cardW / 2);
      const centerY = Math.floor(stageRect.height / 2 - cardH / 2);
      return {
        centerX,
        centerY,
        left: { x: [0, Math.max(0, centerX - cardW)], y: [0, Math.max(0, stageRect.height - cardH)] },
        right: { x: [Math.min(stageRect.width - cardW, centerX + cardW), Math.max(0, stageRect.width - cardW)], y: [0, Math.max(0, stageRect.height - cardH)] }
      };
    }

    function placePhoto(card, x, y, rotateDeg, scale = 1) {
      card.style.left = `${x}px`;
      card.style.top = `${y}px`;
      card.style.transform = `rotate(${rotateDeg}deg) scale(${scale})`;
      card.classList.remove('flipped');
      card.classList.remove('center');
    }

    function sortPhotos(centerIndex) {
      const cards = [...photoStage.querySelectorAll('.memory-photo')];
      if (!cards.length) return;
      const ranges = getPhotoRanges();
      cards.forEach((card) => {
        card.classList.remove('center');
        card.classList.remove('flipped');
      });

      const centerCard = cards[centerIndex];
      centerCard.classList.add('center');
      placePhoto(centerCard, ranges.centerX, ranges.centerY, 0, 1.08);

      const rest = cards.filter((_, i) => i !== centerIndex);
      const leftCount = Math.ceil(rest.length / 2);
      rest.slice(0, leftCount).forEach((card) => {
        placePhoto(
          card,
          randomBetween(ranges.left.x[0], ranges.left.x[1]),
          randomBetween(ranges.left.y[0], ranges.left.y[1]),
          randomBetween(-35, 35)
        );
      });

      rest.slice(leftCount).forEach((card) => {
        placePhoto(
          card,
          randomBetween(ranges.right.x[0], ranges.right.x[1]),
          randomBetween(ranges.right.y[0], ranges.right.y[1]),
          randomBetween(-35, 35)
        );
      });
    }

    function getCurrentCenterIndex(cards) {
      return cards.findIndex((card) => card.classList.contains('center'));
    }

    function getRandomCenterIndex(cards) {
      if (!cards.length) return -1;
      const current = getCurrentCenterIndex(cards);
      if (cards.length === 1) return 0;
      let next = randomBetween(0, cards.length - 1);
      while (next === current) {
        next = randomBetween(0, cards.length - 1);
      }
      return next;
    }

    function handlePhotoClick(card) {
      const cards = [...photoStage.querySelectorAll('.memory-photo')];
      if (!cards.length) return;
      const randomCenter = getRandomCenterIndex(cards);
      if (randomCenter >= 0) {
        sortPhotos(randomCenter);
      }
    }

    function initPhotoShuffle() {
      photoStage.innerHTML = '';
      photosData.forEach((photo, index) => {
        photoStage.appendChild(createPhotoCard(photo, index));
      });
      sortPhotos(randomBetween(0, photosData.length - 1));
    }

    function createBalloonBurst(total = 24, spreadMs = 6000) {
      for (let i = 0; i < total; i++) {
        setTimeout(createBalloon, randomBetween(0, spreadMs));
      }
    }

    function createPopEffect(x, y) {
        const catEl = document.createElement('div');
        catEl.classList.add('pop-emoji');
        catEl.innerText = catEmojis[Math.floor(Math.random() * catEmojis.length)];
        catEl.style.left = x + 'px';
        catEl.style.top = y + 'px';
        document.body.appendChild(catEl);
        setTimeout(() => catEl.remove(), 1500);

        for (let i = 0; i < 5; i++) {
            const heartEl = document.createElement('div');
            heartEl.classList.add('pop-emoji', 'pop-heart');
            heartEl.innerText = '❤️';
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 50 + 20;
            const heartX = x + radius * Math.cos(angle);
            const heartY = y + radius * Math.sin(angle);
            heartEl.style.left = heartX + 'px';
            heartEl.style.top = heartY + 'px';
            heartEl.style.animationDelay = Math.random() * 0.2 + 's';
            document.body.appendChild(heartEl);
            setTimeout(() => heartEl.remove(), 1500);
        }
    }
    
    function createBalloon() {
        const balloon = document.createElement('div');
        balloon.classList.add('balloon');

        const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
        const leftPosition = Math.random() * 90 + 5;
        const riseDuration = Math.random() * 5 + 7;
        const swayDuration = Math.random() * 2 + 3;

        balloon.style.color = color;
        balloon.style.left = leftPosition + 'vw';
        balloon.style.animationDuration = `${riseDuration}s, ${swayDuration}s`;
        balloon.innerText = '🎈';

        balloon.addEventListener('click', () => {
            if (!balloon.classList.contains('popped')) {
                balloon.classList.add('popped');
                const rect = balloon.getBoundingClientRect();
                
                createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2, 50);
                createPopEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);

                setTimeout(() => {
                    balloon.remove();
                    setTimeout(createBalloon, 200); 
                }, 2000);
            }
        }, { once: true });

        mainContent.appendChild(balloon);
    }

    window.addEventListener('resize', () => {
      if (photoStage.children.length) {
        const cards = [...photoStage.querySelectorAll('.memory-photo')];
        const centerIndex = cards.findIndex((card) => card.classList.contains('center'));
        sortPhotos(centerIndex >= 0 ? centerIndex : 0);
      }
    });
  </script>
</body>
</html>
